backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

locale: "de"

collections:

  # ════════════════════════════════════════════════════════
  # COMPOSITIONS
  # ════════════════════════════════════════════════════════
  - name: "compositions"
    label: "Compositions"
    label_singular: "Composition"
    files:
      - label: "All Compositions"
        name: "compositions"
        file: "content/compositions.json"
        format: json
        fields:
          - label: "Compositions"
            name: "items"
            widget: list
            summary: "{{fields.title_en}} — {{fields.year}}"
            fields:
              - { label: "Title (EN)", name: title_en, widget: string, hint: "e.g. Piano Piece No. 1" }
              - { label: "Title (DE)", name: title_de, widget: string, hint: "z.B. Klavierstuck Nr. 1" }
              - { label: "Year", name: year, widget: string, hint: "e.g. 2025" }
              - { label: "Instrumentation (EN)", name: instrumentation_en, widget: string, hint: "e.g. for solo piano" }
              - { label: "Instrumentation (DE)", name: instrumentation_de, widget: string, hint: "z.B. fuer Soloklavier" }
              - { label: "Duration", name: duration, widget: string, required: false, hint: "e.g. ca. 8'" }
              - { label: "Description (EN)", name: desc_en, widget: text, required: false }
              - { label: "Description (DE)", name: desc_de, widget: text, required: false }
              - { label: "Audio file (MP3)", name: audio, widget: file, required: false }
              - { label: "Audio label (EN)", name: audio_label_en, widget: string, required: false, hint: "e.g. Excerpt 2:34" }
              - { label: "Audio label (DE)", name: audio_label_de, widget: string, required: false, hint: "z.B. Ausschnitt 2:34" }

  # ════════════════════════════════════════════════════════
  # FILM MUSIC
  # ════════════════════════════════════════════════════════
  - name: "films"
    label: "Film Music"
    label_singular: "Film"
    files:
      - label: "All Films"
        name: "films"
        file: "content/films.json"
        format: json
        fields:
          - label: "Films"
            name: "items"
            widget: list
            summary: "{{fields.title_en}} — {{fields.year}}"
            fields:
              - { label: "Title (EN)", name: title_en, widget: string }
              - { label: "Title (DE)", name: title_de, widget: string }
              - { label: "Director", name: director, widget: string }
              - { label: "Year", name: year, widget: string }
              - { label: "Genre (EN)", name: genre_en, widget: string, hint: "e.g. Short Film, Documentary, Feature Film" }
              - { label: "Genre (DE)", name: genre_de, widget: string, hint: "z.B. Kurzfilm, Dokumentarfilm, Spielfilm" }
              - { label: "Video embed URL (YouTube or Vimeo)", name: vimeo, widget: string, required: false, hint: "YouTube: https://www.youtube.com/embed/VIDEO_ID  |  Vimeo: https://player.vimeo.com/video/ID?dnt=1" }
              - { label: "Description (EN)", name: desc_en, widget: text, required: false }
              - { label: "Description (DE)", name: desc_de, widget: text, required: false }

  # ════════════════════════════════════════════════════════
  # SITE SETTINGS
  # ════════════════════════════════════════════════════════
  - name: "settings"
    label: "Site Settings"
    files:

      - label: "Home Page"
        name: "home"
        file: "content/settings.json"
        format: json
        fields:
          - { label: "Artist name (nav + footer)", name: artist_name, widget: string, default: "Tjelle" }
          - { label: "Hero statement (EN)", name: subtitle_en, widget: string, hint: "Short poetic line e.g. Music between tension and transcendence." }
          - { label: "Hero statement (DE)", name: subtitle_de, widget: string }
          - { label: "Statement section text (EN)", name: statement_en, widget: text, hint: "2-3 sentences below the tiles" }
          - { label: "Statement section text (DE)", name: statement_de, widget: text }
          - { label: "Based in / open to (EN)", name: based_en, widget: string, hint: "e.g. Based in Berlin. Open to film, theatre and concert commissions." }
          - { label: "Based in / open to (DE)", name: based_de, widget: string }
          - widget: object
            label: "Tile 1 (large left)"
            name: tile1
            fields:
              - { label: "Category (EN)", name: cat_en, widget: string, default: "Film Score" }
              - { label: "Category (DE)", name: cat_de, widget: string, default: "Filmmusik" }
              - { label: "Title (EN)", name: title_en, widget: string, default: "[Film Title]" }
              - { label: "Title (DE)", name: title_de, widget: string, default: "[Filmtitel]" }
              - { label: "Year", name: year, widget: string, default: "2024" }
              - { label: "Links to", name: link, widget: select, options: ["film","comps","about","contact"], default: "film" }
              - { label: "Background image", name: image, widget: image, required: false }
          - widget: object
            label: "Tile 2 (top right)"
            name: tile2
            fields:
              - { label: "Category (EN)", name: cat_en, widget: string, default: "Concert Music" }
              - { label: "Category (DE)", name: cat_de, widget: string, default: "Konzertmusik" }
              - { label: "Title (EN)", name: title_en, widget: string, default: "[Concert Work]" }
              - { label: "Title (DE)", name: title_de, widget: string, default: "[Konzertwerk]" }
              - { label: "Year", name: year, widget: string, default: "2025" }
              - { label: "Links to", name: link, widget: select, options: ["film","comps","about","contact"], default: "comps" }
              - { label: "Background image", name: image, widget: image, required: false }
          - widget: object
            label: "Tile 3 (bottom right)"
            name: tile3
            fields:
              - { label: "Category (EN)", name: cat_en, widget: string, default: "Chamber Music" }
              - { label: "Category (DE)", name: cat_de, widget: string, default: "Kammermusik" }
              - { label: "Title (EN)", name: title_en, widget: string, default: "[Chamber Work]" }
              - { label: "Title (DE)", name: title_de, widget: string, default: "[Kammerwerk]" }
              - { label: "Year", name: year, widget: string, default: "2024" }
              - { label: "Links to", name: link, widget: select, options: ["film","comps","about","contact"], default: "comps" }
              - { label: "Background image", name: image, widget: image, required: false }

      - label: "About Page"
        name: "about"
        file: "content/about.json"
        format: json
        fields:
          - { label: "Biography paragraph 1 (EN)", name: bio1_en, widget: text, hint: "Introduction. ~80 words, third person." }
          - { label: "Biography paragraph 1 (DE)", name: bio1_de, widget: text }
          - { label: "Biography paragraph 2 (EN)", name: bio2_en, widget: text, required: false, hint: "Optional — studies, works, philosophy." }
          - { label: "Biography paragraph 2 (DE)", name: bio2_de, widget: text, required: false }
          - label: "Tags (areas of work)"
            name: tags
            widget: list
            summary: "{{fields.en}}"
            hint: "Up to 6 tags"
            fields:
              - { label: "Tag EN", name: en, widget: string }
              - { label: "Tag DE", name: de, widget: string }
          - { label: "Portrait photo", name: portrait, widget: image, required: false, hint: "Portrait JPG, max 500KB" }
          - { label: "Portrait credit", name: portrait_credit, widget: string, required: false, hint: "e.g. Photo: Max Mustermann" }
          - { label: "CV PDF", name: cv, widget: file, required: false }

      - label: "Contact Page"
        name: "contact"
        file: "content/contact.json"
        format: json
        fields:
          - { label: "Intro text (EN)", name: intro_en, widget: text }
          - { label: "Intro text (DE)", name: intro_de, widget: text }
          - { label: "Email address", name: email, widget: string }
          - { label: "Instagram handle (without @)", name: instagram, widget: string, required: false }
          - { label: "Vimeo profile URL", name: vimeo, widget: string, required: false }
          - { label: "SoundCloud profile URL", name: soundcloud, widget: string, required: false }

      - label: "Impressum"
        name: "impressum"
        file: "content/impressum.json"
        format: json
        fields:
          - { label: "Full name", name: name, widget: string, hint: "Vollstaendiger Name" }
          - { label: "Street + number", name: street, widget: string }
          - { label: "Postcode + city", name: city, widget: string, hint: "e.g. 12345 Berlin" }
          - { label: "Country", name: country, widget: string, default: "Deutschland" }
          - { label: "Email", name: email, widget: string }
          - { label: "Additional info (optional)", name: extra, widget: text, required: false, hint: "e.g. Umsatzsteuer-ID, Berufsbezeichnung" }
